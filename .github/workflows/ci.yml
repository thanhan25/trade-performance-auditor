name: Continuous Integration Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Execution Layer ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Ingest Development Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Validate Import Sorting Rules (isort)
      run: isort --check-only src tests

    - name: Enforce Code Styling Standards (black)
      run: black --check src tests

    - name: Run Testing Matrices and Enforce 90% Coverage Gate
      run: python -m pytest